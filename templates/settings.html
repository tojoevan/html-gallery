<!doctype html>
<html lang=zh>
<head>
  <meta charset=utf-8>
  <title>用户设置 - HTMLGallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #f8f9fa; --surface: #fff; --text: #1a1a2e; --border: #e8eaed; --accent: #5b6af0; --muted: #8a8fa8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand {
      font-size: 1.1rem; font-weight: 600; color: var(--text);
      text-decoration: none; letter-spacing: -.3px; line-height: 1;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: .5rem; align-items: center; }
    .nav-links a { font-size: .875rem; color: var(--muted); text-decoration: none; padding: .4rem .85rem; border-radius: 8px; transition: all .15s; }
    .nav-links a:hover { color: var(--text); background: var(--bg); }
    .btn-primary { background: var(--accent); color: #fff !important; padding: .4rem 1rem !important; border-radius: 8px; font-weight: 500; line-height: 1.5; }
    .btn-primary:hover { background: #4a5ad4 !important; }

    .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

    .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #444; }
    
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .4rem; font-weight: 500; color: #555; }
    .form-group input { width: 100%; padding: .6rem .8rem; border: 1px solid var(--border); border-radius: 8px; font-size: .95rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    
    .btn { padding: .6rem 1.2rem; border-radius: 8px; font-size: .95rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); text-decoration: none; display: inline-block; }
    .btn-primary { background: var(--accent); color: #fff !important; padding: .4rem 1rem !important; border-radius: 8px; font-weight: 500; line-height: 1.5; }
    .btn-primary:hover { background: #4a5ad4 !important; }
    
    .flash { background: #e8f5e9; color: #2e7d32; padding: .8rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .error { background: #ffebee; color: #c62828; padding: .8rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="{{ url_for('index') }}">HTML<span>Gallery</span></a>
  <div class="nav-links">
    <a href="{{ url_for('new_page') }}" class="btn-primary">+ 新建</a>
    <a href="{{ url_for('dashboard') }}">我的作品</a>
    <a href="{{ url_for('index') }}">首页</a>
    <a href="{{ url_for('settings') }}">设置</a>
    <a href="{{ url_for('logout') }}">退出</a>
  </div>
</nav>

<div class="container">
  <h1>用户设置</h1>
  
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  
  <div class="card">
    <h2>个人信息</h2>
    <form method="post">
      <input type="hidden" name="action" value="update_email">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" value="{{ user.username }}" disabled style="background: #f5f5f5; color: #888;">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" value="{{ user.email or '' }}" placeholder="可选填写">
      </div>
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" name="password" placeholder="修改邮箱前需验证密码" required>
      </div>
      <button type="submit" class="btn btn-primary">保存邮箱</button>
    </form>
  </div>
  
  <div class="card">
    <h2>修改密码</h2>
    <form method="post">
      <input type="hidden" name="action" value="change_password">
      <div class="form-group">
        <label>原密码</label>
        <input type="password" name="old_password" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" name="new_password" required minlength="6">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" name="confirm_password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
  </div>
</div>

</body>
</html>
